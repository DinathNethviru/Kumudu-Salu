<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Kumudu Salu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
<body class="flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html">
                        <img src="" alt="Kumudu Salu Logo" class="brand-logo h-12 w-auto object-contain">
                    </a>
                </div>
                <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                    <a href="index.html" class="nav-link text-gray-500 hover:text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium tracking-wide">
                        HOME
                    </a>
                    <a href="shop.html" class="nav-link text-gray-500 hover:text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium tracking-wide">
                        SHOP
                    </a>
                    <a href="admin.html" class="nav-link active text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium tracking-wide">
                        ADMIN
                    </a>
                </div>
                <div class="flex items-center">
                    <button id="theme-toggle" class="theme-toggle-btn text-gray-500 hover:text-gray-900 transition-transform sm:ml-4 ml-auto">🌙</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-[--primary-color] py-12 text-center text-white">
        <h1 class="text-3xl md:text-4xl font-bold font-serif mb-2">Admin Dashboard</h1>
        <p class="text-[--secondary-color] max-w-2xl mx-auto px-4 font-medium tracking-wide">Manage your website content efficiently.</p>
    </div>

    <!-- Admin Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <!-- Update Logo Section -->
            <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-100 h-fit">
                <h2 class="text-2xl font-serif text-gray-900 mb-6 border-b pb-2">Update Main Logo</h2>
                <div class="mb-6 flex justify-center p-4 bg-gray-50 rounded border">
                    <img id="logo-preview" src="" alt="Current Logo" class="brand-logo h-20 w-auto object-contain">
                </div>
                
                <form id="logo-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Select new logo image (PNG/JPG)</label>
                        <input type="file" id="logo-upload" accept="image/*" class="w-full text-sm text-gray-500 
                            file:mr-4 file:py-2 file:px-4 
                            file:rounded-full file:border-0 
                            file:text-sm file:font-semibold 
                            file:bg-[--primary-color] file:text-white 
                            hover:file:bg-[#b5952f] cursor-pointer">
                    </div>
                    <button type="submit" class="w-full btn-dark py-3 mt-4">Update Logo</button>
                    <p id="logo-msg" class="text-green-600 text-sm hidden justify-center mt-2 flex font-medium"></p>
                </form>
            </div>

            <!-- Upload Product Section -->
            <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                 <h2 class="text-2xl font-serif text-gray-900 mb-6 border-b pb-2">Add New Product</h2>
                 <form id="product-form" class="space-y-6">
                    <div>
                        <label for="p-name" class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                        <input type="text" id="p-name" required class="w-full border-gray-300 border rounded-md shadow-sm p-3 focus:ring-[--primary-color] focus:border-[--primary-color]" placeholder="e.g. Modern Fusion Saree">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="p-price" class="block text-sm font-medium text-gray-700 mb-1">Price (LKR)</label>
                            <input type="number" id="p-price" required min="1" class="w-full border-gray-300 border rounded-md shadow-sm p-3 focus:ring-[--primary-color] focus:border-[--primary-color]" placeholder="e.g. 15000">
                        </div>
                        <div>
                            <label for="p-category" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                            <select id="p-category" class="w-full border-gray-300 border rounded-md shadow-sm p-3 focus:ring-[--primary-color] focus:border-[--primary-color]">
                                <option value="women">Women</option>
                                <option value="men">Men</option>
                                <option value="kids">Kids</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Product Image</label>
                        <div class="image-upload-wrapper" id="drop-zone" onclick="document.getElementById('p-image').click()">
                            <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <div class="flex text-sm text-gray-600 justify-center mt-2">
                                <span class="relative cursor-pointer rounded-md font-medium text-[--primary-color] hover:text-[#b5952f] focus-within:outline-none">
                                    <span>Upload a file</span>
                                    <input id="p-image" name="p-image" type="file" accept="image/*" required class="sr-only">
                                </span>
                                <p class="pl-1">or drag and drop</p>
                            </div>
                            <p class="text-xs text-gray-500 mt-2" id="file-name-display">PNG, JPG up to 5MB</p>
                        </div>
                        <!-- Preview uploaded product image -->
                        <div class="mt-4 hidden justify-center" id="img-preview-container">
                            <img id="new-product-img" src="" alt="Preview" class="h-32 rounded-md object-cover shadow border">
                        </div>
                    </div>

                    <button type="submit" class="w-full btn-primary py-3 text-lg mt-4 shadow-lg">Upload Product</button>
                    <p id="product-msg" class="text-green-600 text-sm hidden justify-center mt-2 flex font-medium"></p>
                </form>
            </div>
        </div>

        <!-- Update Contact Section -->
        <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-100 mt-12">
            <h2 class="text-2xl font-serif text-gray-900 mb-6 border-b pb-2">Update Contact Details</h2>
            <form id="contact-form" class="space-y-4 max-w-2xl mx-auto">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="c-email" required class="w-full border-gray-300 border rounded-md shadow-sm p-3 focus:ring-[--primary-color] focus:border-[--primary-color]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="text" id="c-phone" required class="w-full border-gray-300 border rounded-md shadow-sm p-3 focus:ring-[--primary-color] focus:border-[--primary-color]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                    <textarea id="c-address" required class="w-full border-gray-300 border rounded-md shadow-sm p-3 focus:ring-[--primary-color] focus:border-[--primary-color]" rows="2"></textarea>
                </div>
                <button type="submit" class="w-full btn-dark py-3 mt-4">Save Contact Details</button>
                <p id="contact-msg" class="text-green-600 text-sm hidden justify-center mt-2 flex font-medium"></p>
            </form>
        </div>
    </main>

    <!-- Footer Summary -->
    <footer class="bg-gray-900 text-white py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <img src="" alt="Kumudu Salu Logo" class="brand-logo h-10 w-auto mx-auto mb-4 bg-white p-2 rounded">
            <p class="text-gray-500 text-sm">&copy; 2026 Kumudu Salu. Designed with elegance in Sri Lanka.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Logo Upload Logic ---
            const logoForm = document.getElementById('logo-form');
            const logoUpload = document.getElementById('logo-upload');
            const logoMsg = document.getElementById('logo-msg');

            logoForm.addEventListener('submit', (e) => {
                e.preventDefault();
                if (logoUpload.files && logoUpload.files[0]) {
                    const file = logoUpload.files[0];
                    readFileAsDataURL(file, (dataUrl) => {
                        setLogo(dataUrl);
                        
                        // Update all logo elements instantly
                        const logoElements = document.querySelectorAll(".brand-logo");
                        logoElements.forEach(img => img.src = dataUrl);

                        logoMsg.textContent = "Logo updated successfully!";
                        logoMsg.classList.remove('hidden');
                        setTimeout(() => logoMsg.classList.add('hidden'), 3000);
                        logoUpload.value = '';
                    });
                }
            });

            // --- Product Upload Logic ---
            const productForm = document.getElementById('product-form');
            const productImgInput = document.getElementById('p-image');
            const fileNameDisplay = document.getElementById('file-name-display');
            const imgPreviewContainer = document.getElementById('img-preview-container');
            const newProductImg = document.getElementById('new-product-img');
            const productMsg = document.getElementById('product-msg');

            // --- Contact Edit Logic ---
            const contactForm = document.getElementById('contact-form');
            const contactEmail = document.getElementById('c-email');
            const contactPhone = document.getElementById('c-phone');
            const contactAddress = document.getElementById('c-address');
            const contactMsg = document.getElementById('contact-msg');

            const savedContact = getContactDetails();
            if(savedContact) {
                contactEmail.value = savedContact.email;
                contactPhone.value = savedContact.phone;
                contactAddress.value = savedContact.address;
            }

            contactForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const newContact = {
                    email: contactEmail.value,
                    phone: contactPhone.value,
                    address: contactAddress.value
                };
                setContactDetails(newContact);
                contactMsg.textContent = "Contact details updated successfully!";
                contactMsg.classList.remove('hidden');
                setTimeout(() => contactMsg.classList.add('hidden'), 3000);
            });

            // Preview image on file select
            productImgInput.addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    const file = this.files[0];
                    fileNameDisplay.textContent = file.name;
                    readFileAsDataURL(file, (dataUrl) => {
                        newProductImg.src = dataUrl;
                        imgPreviewContainer.classList.remove('hidden');
                        imgPreviewContainer.classList.add('flex');
                    });
                }
            });

            // Handle submission
            productForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const name = document.getElementById('p-name').value;
                const price = parseInt(document.getElementById('p-price').value);
                const category = document.getElementById('p-category').value;
                
                if (productImgInput.files && productImgInput.files[0]) {
                    const file = productImgInput.files[0];

                    readFileAsDataURL(file, (dataUrl) => {
                        // We check length to simulate a unique ID
                        const products = getProducts();
                        const newId = products.length > 0 ? products[products.length - 1].id + 1 : 1;
                        
                        const newProduct = {
                            id: newId,
                            name: name,
                            price: price,
                            category: category,
                            image: dataUrl
                        };
                        
                        saveProduct(newProduct);

                        // Success Msg
                        productMsg.textContent = "Product successfully uploaded!";
                        productMsg.classList.remove('hidden');
                        setTimeout(() => productMsg.classList.add('hidden'), 3000);

                        // Reset form
                        productForm.reset();
                        fileNameDisplay.textContent = "PNG, JPG up to 5MB";
                        imgPreviewContainer.classList.add('hidden');
                        imgPreviewContainer.classList.remove('flex');
                        newProductImg.src = "";
                    });
                } else {
                    alert("Please select an image file.");
                }
            });

            // Drag and drop logic (optional visual enhancement)
            const dropzone = document.getElementById('drop-zone');
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('border-[--primary-color]', 'bg-[#fefce8]');
            });
            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('border-[--primary-color]', 'bg-[#fefce8]');
            });
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('border-[--primary-color]', 'bg-[#fefce8]');
                
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    productImgInput.files = e.dataTransfer.files;
                    productImgInput.dispatchEvent(new Event('change'));
                }
            });

        });
    </script>
</body>
</html>
